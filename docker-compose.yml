version: '3.8'
services:
  mysql-db:
    image: mysql:8.0.32
    container_name: cloud_storage_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cloud_storage
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  minio:
    image: minio/minio
    container_name: cloud_storage_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    container_name: cloud_storage_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  db_data:
  minio_data:
  qdrant_data: